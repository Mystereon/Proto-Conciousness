services:
  indigo:
    build: .
    ports:
      - "${INDIGO_PORT:-5000}:5000"
    volumes:
      - ./models:/models
    environment:
      - INDIGO_HOST=0.0.0.0
      - INDIGO_PORT=5000
      - INDIGO_MODEL_DIR=/models
      - INDIGO_CTX_SIZE=${INDIGO_CTX_SIZE:-2048}
      - INDIGO_MAX_TOKENS=${INDIGO_MAX_TOKENS:-256}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

