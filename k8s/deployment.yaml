apiVersion: apps/v1
kind: Deployment
metadata:
  name: indigo
  labels:
    app: indigo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indigo
  template:
    metadata:
      labels:
        app: indigo
    spec:
      containers:
        - name: indigo
          image: indigo
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: indigo-config
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: indigo-models
